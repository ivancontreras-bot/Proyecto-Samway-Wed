<footer id="pie">
  <div class="footer-container">
    
    <div class="footer-section newsletter">
      <h4>Suscríbete a nuestro Newsletter</h4>
      <p>Recibe las mejores ofertas de Samway directamente en tu correo.</p>
      
      <form (ngSubmit)="suscribir()">
        <div class="input-group">
          <input 
            type="email" 
            [(ngModel)]="email" 
            name="email" 
            placeholder="tu@correo.com" 
            class="email-input"
            required>
          <button type="submit" class="botonForm">Enviar</button>
        </div>
      </form>
    </div>

    <div class="footer-section info">
      <p>Realice sus pedidos en cualquier lugar a cualquier hora.</p>
      <div class="contacto-detalles">
        <p>📍 500 calle 500, San Francisco, CA 4098</p>
        <p>📞 123-456-7890</p>
        <p>✉️ contacto@samway.com</p>
      </div>
    </div>

    <div class="footer-section redes">
      <h4>Síguenos</h4>
      <div class="social-icons">
        <a href="#"><img src="/fotos/INSTA.png" alt="Instagram"></a>
        <a href="#"><img src="/fotos/faceb.png" alt="Facebook"></a>
        <a href="#"><img src="/fotos/what.png" alt="WhatsApp"></a>
        <a href="#"><img src="/fotos/tik.png" alt="TikTok"></a>
      </div>
    </div>

  </div>

  <div class="footer-bottom">
    <p>&copy; 2026 Samway. Todos los derechos reservados.</p>
  </div>
</footer>
